name: Apply architecture refactor

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: agent/architecture-refactor-20260711
          fetch-depth: 0
          show-progress: false

      - name: Decode and apply refactor
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp .github/workflows/architecture-refactor.yml /tmp/architecture-refactor.yml
          base64 --decode .github/scripts/architecture_refactor.py.gz.b64 | gzip --decompress > .github/scripts/architecture_refactor.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/architecture_refactor.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              "if 'Quest.TrySubmitResources' not in adapter or 'Quest.CaptureSaveData' not in adapter:",
              "if '.TrySubmitResources' not in adapter or '.CaptureSaveData' not in adapter:")
          path.write_text(source, encoding='utf-8')
          PY
          set +e
          python3 .github/scripts/architecture_refactor.py > /tmp/architecture-refactor.log 2>&1
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            printf 'Architecture validation failed:\n\n```text\n' > /tmp/comment.md
            tail -80 /tmp/architecture-refactor.log >> /tmp/comment.md
            printf '\n```\n' >> /tmp/comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md
            exit "$exit_code"
          fi
          mkdir -p .github/workflows
          cp /tmp/architecture-refactor.yml .github/workflows/architecture-refactor.yml
          rm -f .github/architecture-refactor-error.log

      - name: Commit generated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "refactor: split game systems and persistence [skip ci]"
          git push origin HEAD:agent/architecture-refactor-20260711
