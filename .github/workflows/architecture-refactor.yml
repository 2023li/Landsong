name: Apply architecture refactor

on:
  pull_request:

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: agent/architecture-refactor-20260711
          fetch-depth: 0

      - name: Decode and apply refactor
        shell: bash
        run: |
          cp .github/workflows/architecture-refactor.yml /tmp/architecture-refactor.yml
          base64 --decode .github/scripts/architecture_refactor.py.gz.b64 | gzip --decompress > .github/scripts/architecture_refactor.py
          set +e
          python3 .github/scripts/architecture_refactor.py > /tmp/architecture-refactor.log 2>&1
          exit_code=$?
          set -e
          tail -120 /tmp/architecture-refactor.log
          if [ "$exit_code" -ne 0 ]; then
            exit "$exit_code"
          fi
          mkdir -p .github/workflows
          cp /tmp/architecture-refactor.yml .github/workflows/architecture-refactor.yml

      - name: Commit generated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "refactor: split game systems and persistence [skip ci]"
          git push origin HEAD:agent/architecture-refactor-20260711
