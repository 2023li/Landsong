name: Run API unification

on:
  push:
    branches:
      - agent/unify-public-api
    paths:
      - .github/workflows/api-unification-run.yml
      - .github/scripts/unify_public_api.py

permissions:
  contents: write

jobs:
  unify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-public-api
          fetch-depth: 0

      - name: Run migration
        shell: bash
        run: |
          rm -f .github/API_UNIFICATION_ERROR.status .github/API_UNIFICATION_ERROR.txt
          set +e
          python3 .github/scripts/unify_public_api.py > /tmp/api-unification.txt 2>&1
          status=$?
          set -e
          cat /tmp/api-unification.txt
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            rm -f .github/API_UNIFICATION_ERROR.status .github/API_UNIFICATION_ERROR.txt
            cp /tmp/api-unification.txt .github/API_UNIFICATION_ERROR.txt
            echo "$status" > .github/API_UNIFICATION_ERROR.status
          fi

      - name: Commit result
        shell: bash
        run: |
          git diff --check
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if [ -f .github/API_UNIFICATION_ERROR.status ]; then
            git commit -m "chore: record API migration failure [skip ci]"
          else
            git commit -m "refactor: unify game service APIs [skip ci]"
          fi
          git push origin HEAD:agent/unify-public-api
